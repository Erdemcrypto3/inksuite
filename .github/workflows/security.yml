name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 2 * * 0'

# [PAI-0047] Every job must use --frozen-lockfile so CI matches local exactly;
# any uncommitted lockfile drift fails the build instead of silently mutating
# resolved versions. pnpm audit runs on production deps only at high+ level
# so dev-only advisories don't block PRs.
jobs:
  pnpm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install with frozen lockfile
        run: pnpm install --frozen-lockfile
      - name: pnpm audit (prod deps, high+)
        run: pnpm audit --audit-level=high --prod

  contracts-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install with frozen lockfile
        run: pnpm install --frozen-lockfile
      - name: Hardhat compile
        run: pnpm --filter @inksuite/contracts compile
      - name: Hardhat test
        run: pnpm --filter @inksuite/contracts test
