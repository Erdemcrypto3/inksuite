name = "inkmint-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
routes = [
  { pattern = "api.inksuite.xyz", custom_domain = true }
]

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "inksuite-storage"

# [C-02] KV namespace for tracking used transaction hashes
[[kv_namespaces]]
binding = "USED_TXS"
id = "19a9ecc0c73f428bac02daef27276067"

# [HIGH-03] Shared rate-limit KV (also bound in inkaudit-api)
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "3346e43e14c5475d85b70c4f23d8b0be"

# [CRIT-05] Durable Object for atomic upload counter
[[durable_objects.bindings]]
name = "UPLOAD_COUNTER"
class_name = "UploadCounter"

[[migrations]]
tag = "v1"
new_classes = ["UploadCounter"]

[vars]
ALLOWED_ORIGIN = "https://mint.inksuite.xyz"
INKMINT_ADDRESS = "0x964bf77C2cF0901F0acFaC277601816d2dbEACEe"
INKPOLL_ADDRESS = "0x5ce45f8A28FffFf7A94390DE048610ff4146ff3c"
INKPRESS_ADDRESS = "0x7A0bB0C37a934b3858436E61838719a5a7F63720"
INKPOLL_V2_ADDRESS = "0x4ec2F88AA8E5a1054450909D2b86cE2E285b1b72"
IRYS_TOKEN = "base-eth"
