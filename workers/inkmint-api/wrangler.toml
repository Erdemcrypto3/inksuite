name = "inkmint-api"
main = "src/index.js"
compatibility_date = "2024-12-01"
routes = [
  { pattern = "api.inksuite.xyz", custom_domain = true }
]

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "inksuite-storage"

# [C-02] KV namespace for tracking used transaction hashes
# Create with: wrangler kv:namespace create "USED_TXS"
# Then paste the id below
# [[kv_namespaces]]
# binding = "USED_TXS"
# id = "PASTE_KV_ID_HERE"

[vars]
ALLOWED_ORIGIN = "https://mint.inksuite.xyz"
